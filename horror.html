<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>异闻录 | 恐怖经历投稿站</title>
    <style>
        body {
            background-color: #050505;
            color: #8b0000; /* 深血红 */
            font-family: "Courier New", Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 2px 2px 4px #000;
        }

        /* 呼吸灯背景阴影 */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, black 90%);
            pointer-events: none;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 10px;
            border-right: 3px solid #8b0000;
            white-space: nowrap;
            overflow: hidden;
            animation: typing 3s steps(10), blink 0.5s step-end infinite alternate;
        }

        .cta-button {
            margin-top: 50px;
            padding: 15px 30px;
            border: 1px solid #444;
            background: transparent;
            color: #666;
            cursor: pointer;
            transition: 0.5s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .cta-button:hover {
            color: #ff0000;
            border-color: #ff0000;
            box-shadow: 0 0 20px #8b0000;
        }

        /* 打字机动画 */
        @keyframes typing {
            from { width: 0 }
            to { width: 400px }
        }
        @keyframes blink {
            50% { border-color: transparent }
        }
    </style>
</head>
<body>
    <div class="vignette"></div>
    
    <h1>异闻录...</h1>
    <p style="color: #444;">“这里只有真相，无论它多么令人不安。”</p>

    <button class="cta-button" onclick="alert('你确定要分享那段经历吗？')">
        进入禁地 / 提交投稿
    </button>
    <hr style="border: 0.5px solid #222; margin: 40px 0; width: 80%;">

<div id="submission-form" style="width: 80%; max-width: 500px;">
    <h3 style="color: #660000;">写下你的禁忌经历...</h3>
    
    <input type="text" placeholder="给你的故事取个名字" 
           style="width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #eee; margin-bottom: 15px;">
    
    <textarea placeholder="描述你遇到的那些...东西..." rows="8" 
              style="width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #eee;"></textarea>
    
    <button class="cta-button" style="font-size: 0.8rem; margin-top: 15px; width: 100%;">
        封印并提交
    </button>
</div>


</body>
</html>
